<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Speedrun Dashboard</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000;
        }

        /* Container for the native game code */
        #game-injection-site {
            width: 100%;
            height: 100%;
            border: none;
        }

        /* Ultra-compact minimalist box */
        .timer-widget {
            position: fixed;
            bottom: 15px;
            right: 15px;
            background: #000000; 
            padding: 4px 12px;
            border-radius: 2px;
            user-select: none;
            z-index: 999999;
            pointer-events: none;
        }

        /* White text with the specific shadow layering */
        .time-display {
            font-family: Arial, sans-serif;
            font-size: 36px; 
            font-weight: 900;
            color: #ffffff;
            text-shadow: 2px 2px 0px #333333, 
                         4px 4px 0px #1a1a1a; 
            letter-spacing: -1px;
            line-height: 1;
        }
    </style>
</head>
<body>

    <div id="game-injection-site"></div>

    <div class="timer-widget">
        <div class="time-display" id="display">0:00.00</div>
    </div>

    <script>
        let startTime = 0;
        let elapsedTime = 0;
        let timerInterval = null;
        let isRunning = false;
        const displayEl = document.getElementById('display');

        // Bypassing the iframe wall by pulling the document layout directly
        const targetUrl = "https://ss.randomkzn.com";
        const proxyUrl = "https://api.allorigins.win/get?url=" + encodeURIComponent(targetUrl);

        fetch(proxyUrl)
            .then(res => res.json())
            .then(data => {
                const container = document.getElementById('game-injection-site');
                
                // Fix relative asset links from the target site so images/scripts load
                let cleanHtml = data.contents;
                cleanHtml = cleanHtml.replace(/(src|href)="\/([^"\s>]+)"/g, `$1="${targetUrl}/$2"`);
                
                container.innerHTML = cleanHtml;
                
                // Re-evaluate scripts so the game actually runs inside our window
                const scripts = container.getElementsByTagName('script');
                for (let script of scripts) {
                    const newScript = document.createElement('script');
                    if (script.src) {
                        newScript.src = script.src;
                    } else {
                        newScript.textContent = script.textContent;
                    }
                    document.body.appendChild(newScript);
                }
            })
            .catch(err => {
                console.error("Failed to inject game directly:", err);
            });

        function startPause() {
            if (!isRunning) {
                startTime = Date.now() - elapsedTime;
                timerInterval = setInterval(updateTime, 10);
                isRunning = true;
            } else {
                clearInterval(timerInterval);
                elapsedTime = Date.now() - startTime;
                isRunning = false;
            }
        }

        function reset() {
            clearInterval(timerInterval);
            startTime = 0;
            elapsedTime = 0;
            isRunning = false;
            displayEl.textContent = '0:00.00';
        }

        function updateTime() {
            elapsedTime = Date.now() - startTime;
            let totalMs = elapsedTime;
            let h = Math.floor(totalMs / 3600000);
            totalMs %= 3600000;
            let m = Math.floor(totalMs / 60000);
            totalMs %= 60000;
            let s = Math.floor(totalMs / 1000);
            let ms = Math.floor((totalMs % 1000) / 10);

            let sStr = String(s).padStart(2, '0');
            let msStr = String(ms).padStart(2, '0');

            if (h > 0) {
                displayEl.textContent = `${h}:${String(m).padStart(2, '0')}:${sStr}.${msStr}`;
            } else {
                displayEl.textContent = `${m}:${sStr}.${msStr}`;
            }
        }

        // Because everything lives on ONE layer now, this global listener captures EVERYTHING
        window.addEventListener('keydown', (e) => {
            const key = e.key.toLowerCase();
            if (key === 't') startPause();
            if (key === 'y') reset();
        }, true);
    </script>
</body>
</html>
