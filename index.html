<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Speedrun Dashboard</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000;
        }

        /* Standard direct iframe wrapper */
        .content-frame {
            width: 100%;
            height: 100%;
            border: none;
        }

        /* Ultra-compact minimalist box matching your image style */
        .timer-widget {
            position: fixed;
            bottom: 15px;
            right: 15px;
            background: #000000; 
            padding: 4px 12px;
            border-radius: 2px;
            user-select: none;
            z-index: 999999;
            pointer-events: none; /* Keeps clicks going straight to the game layer */
        }

        /* Solid white text with the crisp dark-gray double shadow shade */
        .time-display {
            font-family: Arial, sans-serif;
            font-size: 36px; 
            font-weight: 900;
            color: #ffffff;
            text-shadow: 2px 2px 0px #333333, 
                         4px 4px 0px #1a1a1a; 
            letter-spacing: -1px;
            line-height: 1;
        }
    </style>
</head>
<body>

    <iframe class="content-frame" src="https://ss.randomkzn.com"></iframe>

    <div class="timer-widget">
        <div class="time-display" id="display">0:00.00</div>
    </div>

    <script>
        let startTime = 0;
        let elapsedTime = 0;
        let timerInterval = null;
        let isRunning = false;
        const displayEl = document.getElementById('display');

        function startPause() {
            if (!isRunning) {
                startTime = Date.now() - elapsedTime;
                timerInterval = setInterval(updateTime, 10);
                isRunning = true;
            } else {
                clearInterval(timerInterval);
                elapsedTime = Date.now() - startTime;
                isRunning = false;
            }
        }

        function reset() {
            clearInterval(timerInterval);
            startTime = 0;
            elapsedTime = 0;
            isRunning = false;
            displayEl.textContent = '0:00.00';
        }

        function updateTime() {
            elapsedTime = Date.now() - startTime;
            let totalMs = elapsedTime;
            let h = Math.floor(totalMs / 3600000);
            totalMs %= 3600000;
            let m = Math.floor(totalMs / 60000);
            totalMs %= 60000;
            let s = Math.floor(totalMs / 1000);
            let ms = Math.floor((totalMs % 1000) / 10);

            let sStr = String(s).padStart(2, '0');
            let msStr = String(ms).padStart(2, '0');

            if (h > 0) {
                displayEl.textContent = `${h}:${String(m).padStart(2, '0')}:${sStr}.${msStr}`;
            } else {
                displayEl.textContent = `${m}:${sStr}.${msStr}`;
            }
        }

        // Global key capture logic for T and Y
        window.addEventListener('keydown', (e) => {
            const key = e.key.toLowerCase();
            if (key === 't') startPause();
            if (key === 'y') reset();
        }, true);
    </script>
</body>
</html>
