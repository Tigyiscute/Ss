<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Speedrun Dashboard Launcher</title>
    <style>
        body {
            background: #0a0a0a;
            color: #fff;
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }
        .setup-box {
            text-align: center;
            padding: 30px;
            background: #111;
            border: 1px solid #222;
            border-radius: 6px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        h1 { font-size: 22px; margin-bottom: 20px; color: #fff; font-weight: 900; }
        .launch-btn {
            background: #ffffff;
            color: #000000;
            border: none;
            padding: 12px 30px;
            font-weight: bold;
            font-size: 14px;
            border-radius: 3px;
            cursor: pointer;
            text-transform: uppercase;
            box-shadow: 0 0 15px rgba(255,255,255,0.1);
        }
        .launch-btn:hover { background: #dddddd; }
        
        /* Floating Speedrun Timer Styles */
        #floating-timer {
            position: fixed;
            top: 20px;
            left: 20px;
            background: #000000;
            padding: 4px 12px;
            border-radius: 2px;
            user-select: none;
            z-index: 999999;
            cursor: move;
            display: none; /* Hidden until launcher is clicked */
        }
        .time-display {
            font-family: Arial, sans-serif;
            font-size: 36px;
            font-weight: 900;
            color: #ffffff;
            text-shadow: 2px 2px 0px #333333, 4px 4px 0px #1a1a1a;
            letter-spacing: -1px;
            line-height: 1;
        }
        .drag-handle {
            font-size: 9px;
            color: #444;
            text-align: center;
            margin-bottom: 2px;
            text-transform: uppercase;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="setup-box" id="setup-ui">
        <h1>New York Speedrun Workspace</h1>
        <button class="launch-btn" id="launch-panel">Open Game & Timer</button>
    </div>

    <div id="floating-timer">
        <div class="drag-handle" id="handle">::: DRAG ME :::</div>
        <div class="time-display" id="display">0:00.00</div>
    </div>

    <script>
        const launchBtn = document.getElementById('launch-panel');
        const setupUi = document.getElementById('setup-ui');
        const timerWidget = document.getElementById('floating-timer');
        const displayEl = document.getElementById('display');

        let startTime = 0;
        let elapsedTime = 0;
        let timerInterval = null;
        let isRunning = false;

        launchBtn.addEventListener('click', () => {
            // 1. Opens the game completely standalone in its own optimized window context
            window.open('https://ss.randomkzn.com', 'GameWindow', 'width=1200,height=800');
            
            // 2. Changes the main GitHub page into a clean background workspace containing only the timer
            setupUi.style.display = 'none';
            document.body.style.background = 'transparent';
            timerWidget.style.display = 'block';
        });

        // Precision Timer Engine
        function startPause() {
            if (!isRunning) {
                startTime = Date.now() - elapsedTime;
                timerInterval = setInterval(updateTime, 10);
                isRunning = true;
            } else {
                clearInterval(timerInterval);
                elapsedTime = Date.now() - startTime;
                isRunning = false;
            }
        }

        function reset() {
            clearInterval(timerInterval);
            startTime = 0;
            elapsedTime = 0;
            isRunning = false;
            displayEl.textContent = '0:00.00';
        }

        function updateTime() {
            elapsedTime = Date.now() - startTime;
            let totalMs = elapsedTime;
            let h = Math.floor(totalMs / 3600000);
            totalMs %= 3600000;
            let m = Math.floor(totalMs / 60000);
            totalMs %= 60000;
            let s = Math.floor(totalMs / 1000);
            let ms = Math.floor((totalMs % 1000) / 10);

            let sStr = String(s).padStart(2, '0');
            let msStr = String(ms).padStart(2, '0');

            if (h > 0) {
                displayEl.textContent = `${h}:${String(m).padStart(2, '0')}:${sStr}.${msStr}`;
            } else {
                displayEl.textContent = `${m}:${sStr}.${msStr}`;
            }
        }

        // Binds work perfectly here because the game is running on your other screen side
        window.addEventListener('keydown', (e) => {
            const key = e.key.toLowerCase();
            if (key === 't') startPause();
            if (key === 'y') reset();
        });

        // Dragging Logic for the Widget
        let isDragging = false;
        let startX, startY, initialX, initialY;
        const handle = document.getElementById('handle');

        handle.addEventListener('mousedown', (e) => {
            isDragging = true;
            initialX = timerWidget.offsetLeft;
            initialY = timerWidget.offsetTop;
            startX = e.clientX;
            startY = e.clientY;
        });

        document.addEventListener('mousemove', (e) => {
            if (!isDragging) return;
            const dx = e.clientX - startX;
            const dy = e.clientY - startY;
            timerWidget.style.left = (initialX + dx) + 'px';
            timerWidget.style.top = (initialY + dy) + 'px';
        });

        document.addEventListener('mouseup', () => { isDragging = false; });
    </script>
</body>
</html>
