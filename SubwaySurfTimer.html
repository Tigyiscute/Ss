<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Speedrun Overlay</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000;
            font-family: Arial, sans-serif;
        }

        /* Fullscreen Game Frame */
        .game-view {
            width: 100%;
            height: 100%;
            border: none;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
        }

        /* Skinny Black Bar (Width 160px, Height 32px) */
        .timer-bar {
            position: absolute;
            top: 24%; 
            left: 0;
            width: 160px; 
            height: 32px; 
            background: #000000; 
            padding: 0 10px;
            box-sizing: border-box;
            display: flex;
            justify-content: flex-end; 
            align-items: center;
            z-index: 999999;
            cursor: pointer;
            outline: none; /* Removes default browser focus border */
        }

        /* High-Contrast White to Gray Gradient Text */
        .time-text {
            font-weight: 900;
            line-height: 1;
            user-select: none;
            display: flex;
            align-items: baseline;
            font-variant-numeric: tabular-nums;
            
            /* Sharp White to Slate Gray Gradient */
            background: linear-gradient(to bottom, #ffffff 15%, #7a7a7a 90%);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* Main number stays constant size */
        .main-num {
            font-size: 26px;
        }

        /* Decimals are visibly smaller */
        .sub-num {
            font-size: 18px; 
            margin-left: 1px;
        }
    </style>
</head>
<body>

    <iframe id="game-frame" class="game-view" src="https://ss.randomkzn.com"></iframe>

    <div class="timer-bar" id="binder-surface" tabindex="0">
        <div class="time-text">
            <span id="main-display" class="main-num">0</span>
            <span id="sub-display" class="sub-num">.00</span>
        </div>
    </div>

    <script>
        let startTime = 0;
        let elapsedTime = 0;
        let timerInterval = null;
        let isRunning = false;
        
        const mainEl = document.getElementById('main-display');
        const subEl = document.getElementById('sub-display');
        const binderSurface = document.getElementById('binder-surface');

        function startPause() {
            if (!isRunning) {
                startTime = Date.now() - elapsedTime;
                timerInterval = setInterval(updateTime, 10);
                isRunning = true;
            } else {
                clearInterval(timerInterval);
                elapsedTime = Date.now() - startTime;
                isRunning = false;
            }
        }

        function reset() {
            clearInterval(timerInterval);
            startTime = 0;
            elapsedTime = 0;
            isRunning = false;
            mainEl.textContent = '0';
            subEl.textContent = '.00';
        }

        function updateTime() {
            elapsedTime = Date.now() - startTime;
            let totalMs = elapsedTime;
            
            let minutes = Math.floor(totalMs / 60000);
            totalMs %= 60000;
            let seconds = Math.floor(totalMs / 1000);
            let milliseconds = Math.floor((totalMs % 1000) / 10);

            let sStr = String(seconds);
            let msStr = String(milliseconds).padStart(2, '0');

            if (minutes > 0) {
                mainEl.textContent = `${minutes}:${String(seconds).padStart(2, '0')}`;
            } else {
                mainEl.textContent = sStr;
            }
            subEl.textContent = `.${msStr}`;
        }

        // Clicking directly on the black bar toggles the timer and listens to keys
        binderSurface.addEventListener('click', (e) => {
            binderSurface.focus();
            startPause();
        });

        // Binds hotkeys directly and exclusively to the timer bar element layout
        binderSurface.addEventListener('keydown', (e) => {
            const key = e.key.toLowerCase();
            if (key === 't') {
                e.preventDefault();
                startPause();
            }
            if (key === 'y') {
                e.preventDefault();
                reset();
            }
        });
    </script>
</body>
</html>
