<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Speedrun Overlay Dashboard</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000;
            font-family: Arial, sans-serif;
        }

        /* Fullscreen Game Frame */
        .game-view {
            width: 100%;
            height: 100%;
            border: none;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
        }

        /* Thick black block matching image_4.png exactly */
        .timer-bar {
            position: absolute;
            top: 24%; 
            left: 0;
            width: 200px; /* Locked width */
            height: 55px; /* Restored thickness - Not skinny */
            background: #000000; 
            padding: 0 15px;
            box-sizing: border-box;
            display: flex;
            justify-content: flex-end; /* Aligns white numbers to the right */
            align-items: center;
            z-index: 999999;
            cursor: pointer;
        }

        /* Bold white timer text matching image_4.png layout */
        .time-text {
            font-size: 42px; /* Thick, readable text size */
            font-weight: 900;
            color: #ffffff; /* Solid White */
            letter-spacing: -1px;
            line-height: 1;
            font-variant-numeric: tabular-nums;
            user-select: none;
        }
    </style>
</head>
<body>

    <!-- Fullscreen Game Frame Layer -->
    <iframe id="game-frame" class="game-view" src="https://ss.randomkzn.com"></iframe>

    <!-- Thick Black Bar Overlay -->
    <div class="timer-bar" id="binder-surface">
        <div class="time-text" id="time-display">0.00</div>
    </div>

    <script>
        let startTime = 0;
        let elapsedTime = 0;
        let timerInterval = null;
        let isRunning = false;
        
        const displayEl = document.getElementById('time-display');
        const binderSurface = document.getElementById('binder-surface');

        function startPause() {
            if (!isRunning) {
                startTime = Date.now() - elapsedTime;
                timerInterval = setInterval(updateTime, 10);
                isRunning = true;
            } else {
                clearInterval(timerInterval);
                elapsedTime = Date.now() - startTime;
                isRunning = false;
            }
        }

        function reset() {
            clearInterval(timerInterval);
            startTime = 0;
            elapsedTime = 0;
            isRunning = false;
            displayEl.textContent = '0.00';
        }

        function updateTime() {
            elapsedTime = Date.now() - startTime;
            let totalMs = elapsedTime;
            
            let minutes = Math.floor(totalMs / 60000);
            totalMs %= 60000;
            let seconds = Math.floor(totalMs / 1000);
            let milliseconds = Math.floor((totalMs % 1000) / 10);

            let sStr = String(seconds).padStart(2, '0');
            let msStr = String(milliseconds).padStart(2, '0');

            if (minutes > 0) {
                displayEl.textContent = `${minutes}:${sStr}.${msStr}`;
            } else {
                displayEl.textContent = `${seconds}.${msStr}`;
            }
        }

        /* Clicking the black bar focuses the hotkeys */
        binderSurface.addEventListener('click', () => {
            window.focus();
            startPause();
        });

        // T to Start/Stop, Y to Reset
        window.addEventListener('keydown', (e) => {
            const key = e.key.toLowerCase();
            if (key === 't') startPause();
            if (key === 'y') reset();
        });
    </script>
</body>
</html>
